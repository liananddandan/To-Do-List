name: .NET CI with MySQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ASPNETCORE_ENVIRONMENT: CI
      ConnectionStrings__DefaultConnection: "server=127.0.0.1;port=3306;database=testdb;user=testuser;password=testpass"
      Jwt__Issuer: "test-issuer"
      Jwt__Audience: "test-audience"
      Jwt__IssuerSigningKey: "this-is-a-ci-secret-key-with-at-least-32-bytes"
      Jwt__AccessTokenExpiresMinutes: "30"
      Jwt__RefreshTokenExpiresDays: "7"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install EF Core CLI tools
        run: dotnet tool install --global dotnet-ef

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore To-Do-List.sln

      - name: Build solution
        run: dotnet build To-Do-List.sln --configuration Release --no-restore

      - name: Apply EF migration - MyIdentityDbContext
        run: >
          dotnet ef database update
          --context MyIdentityDbContext
          --project src/To-Do-List/To-Do-List.csproj
          --startup-project src/To-Do-List/To-Do-List.csproj

      - name: Apply EF migration - TaskDbContext
        run: >
          dotnet ef database update
          --context TaskDbContext
          --project src/To-Do-List/To-Do-List.csproj
          --startup-project src/To-Do-List/To-Do-List.csproj

      - name: Run tests
        run: >
          dotnet test src/To-Do-List.Tests/To-Do-List.Tests.csproj
          --configuration Release
          --no-build
          --logger "console;verbosity=normal"