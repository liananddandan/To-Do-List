services:
  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: todo
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_pass
    ports:
      - "3308:3306"
    volumes:
      - todo_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: todo-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=todo;user=todo_user;password=todo_pass"
      Jwt__Issuer: "todo-app"
      Jwt__Audience: "todo-client"
      Jwt__IssuerSigningKey: "this-is-a-very-long-secret-key-for-docker-123456"
      Jwt__AccessTokenExpiresMinutes: "60"
      Jwt__RefreshTokenExpiresDays: "7"
    ports:
      - "5166:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: todo-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  todo_mysql_data: